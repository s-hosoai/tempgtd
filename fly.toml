# fly.toml app configuration file generated for tempgtd on 2026-05-02T16:26:53+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tempgtd'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/gtd.db'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'gtd_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
